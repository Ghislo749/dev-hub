<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R — build log</title>

    <style>
        :root {
            --bg: #0b0e14;
            --panel: #121622;
            --border: #2a2f45;
            --text: #cdd6f4;
            --muted: #8b93b1;
            --accent: #7aa2f7;
            --accent-soft: rgba(122, 162, 247, 0.15);
            --success: #9ece6a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(1200px 600px at 10% -10%, #11162a, transparent),
                radial-gradient(800px 400px at 90% 10%, #0f1430, transparent),
                var(--bg);
            color: var(--text);
            font-family: "Fira Code", Consolas, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .terminal {
            width: 100%;
            max-width: 720px;
            background: linear-gradient(180deg, #121622, #0f1320);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.02),
                0 30px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.25);
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red {
            background: #f7768e;
        }

        .dot.yellow {
            background: #e0af68;
        }

        .dot.green {
            background: #9ece6a;
        }

        .title {
            margin-left: auto;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .content {
            padding: 18px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .prompt {
            color: var(--success);
            margin-bottom: 14px;
            font-size: 0.9rem;
        }

        .prompt span {
            color: var(--accent);
        }

        .project {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .project+.project {
            margin-top: 10px;
        }

        .project:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .project::before {
            content: ">";
            color: var(--accent);
            opacity: 0;
            position: absolute;
            left: 6px;
            transition: opacity 0.2s;
        }

        .project:hover::before,
        .project:focus-visible::before {
            opacity: 1;
        }

        .project:focus-visible {
            outline: none;
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        .icon {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            object-fit: cover;
            background: #000;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .icon-text {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            color: var(--accent);
            background: var(--accent-soft);
        }

        .action.soon {
            color: #e0af68;
            border-color: #e0af68;
        }

        .project:hover .action.soon {
            background: #e0af68;
            color: #0b0e14;
        }

        .info {
            flex: 1;
            min-width: 0;
        }

        .name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .desc {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 2px;
            line-height: 1.4;
        }

        .action {
            font-size: 0.8rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .project:hover .action {
            background: var(--accent);
            color: #0b0e14;
        }

        .footer {
            margin-top: 16px;
            font-size: 0.75rem;
            color: var(--muted);
            opacity: 0.7;
        }

        @media (max-width: 520px) {
            .action {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="terminal">
        <div class="terminal-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <div class="title">R@builds ~ projects</div>
        </div>

        <div class="content">
            <div class="prompt"><span>$</span> ls ./projects</div>

            <!-- NovaBot -->
            <div class="project" tabindex="0"
                onclick="openLink('https://nova.zeroauthoritydao.com/')"
                onkeydown="handleKey(event, 'https://nova.zeroauthoritydao.com/')">
                <img class="icon" src="https://nova.zeroauthoritydao.com/images/nova_logo.jpg" alt="NovaBot" />
                <div class="info">
                    <div class="name">NovaBot</div>
                    <div class="desc">Discord / Telegram bot + AI agent for Stacks & Bitcoin</div>
                </div>
                <a class="action" href="https://nova.zeroauthoritydao.com/" target="_blank"
                    onclick="event.stopPropagation()">open</a>
            </div>

            <!-- !Punks -->
            <div class="project" tabindex="0" onclick="openLink('https://bestinslot.xyz/ordinals/collections/punks_')"
                onkeydown="handleKey(event, 'https://bestinslot.xyz/ordinals/collections/punks_')">
                <img class="icon"
                    src="https://creator-hub-prod.s3.us-east-2.amazonaws.com/ord-_punks_pfp_1697039030447.png"
                    alt="!Punks" />
                <div class="info">
                    <div class="name">!Punks</div>
                    <div class="desc">Bitcoin inscribed NFT collection</div>
                </div>
                <a class="action" href="https://bestinslot.xyz/ordinals/collections/punks_" target="_blank"
                    onclick="event.stopPropagation()">open</a>
            </div>

            <!-- MyAgents -->
            <div class="project" tabindex="0" onclick="openLink('https://zadao.ai/agents/')"
                onkeydown="handleKey(event, 'https://zadao.ai/agents/')">
                <img class="icon" src="https://www.google.com/s2/favicons?domain=zadao.ai&amp;sz=128"
                    alt="MyAgents" />
                <div class="info">
                    <div class="name">MyAgents</div>
                    <div class="desc">ZaDAO AI agents platform</div>
                </div>
                <a class="action" href="https://zadao.ai/agents/" target="_blank"
                    onclick="event.stopPropagation()">open</a>
            </div>

            <!-- Axis -->
            <div class="project" tabindex="0" onclick="openLink('https://axis-inky-one.vercel.app/')"
                onkeydown="handleKey(event, 'https://axis-inky-one.vercel.app/')">
                <div class="icon icon-text">AX</div>
                <div class="info">
                    <div class="name">Axis</div>
                    <div class="desc">Marketplace — coming soon</div>
                </div>
                <a class="action soon" href="https://axis-inky-one.vercel.app/" target="_blank"
                    onclick="event.stopPropagation()">soon</a>
            </div>

            <div class="footer">// stable branch</div>
        </div>
    </div>

    <script>
        function openLink(url) {
            window.open(url, "_blank");
        }
        function handleKey(e, url) {
            if (e.key === "Enter") openLink(url);
        }
    </script>

</body>

</html>
